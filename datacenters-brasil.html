<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa dos Data Centers de IA</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

html,body{
    height:100%;
}

body{
    display:flex;
    flex-direction:column;
    background:#111827;
}

header{
    background:#0f172a;
    color:#fff;
    padding:16px 24px;
    border-bottom:1px solid #334155;
}

header h1{
    font-size:24px;
}

header p{
    color:#94a3b8;
    margin-top:4px;
}

#map{
    flex:1;
}

.legend{
    position:absolute;
    z-index:1000;
    right:12px;
    bottom:12px;
    background:white;
    padding:12px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.25);
    font-size:13px;
    line-height:1.6;
}

.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    display:inline-block;
    margin-right:6px;
}

footer{
    background:#fff;
    padding:8px 16px;
    font-size:12px;
    color:#666;
}
</style>
</head>
<body>

<header>
<h1>Mapa dos Data Centers de IA</h1>
<p>Projetos anunciados no Brasil</p>
</header>

<div id="map"></div>

<div class="legend">
<b>Status</b><br><br>

<div><span class="dot" style="background:#2563eb"></span>Anunciado</div>
<div><span class="dot" style="background:#16a34a"></span>Construção</div>
<div><span class="dot" style="background:#f59e0b"></span>Licenciamento</div>
<div><span class="dot" style="background:#dc2626"></span>Planejado</div>
<div><span class="dot" style="background:#7c3aed"></span>Expansão</div>
</div>

<footer>
OpenStreetMap © contributors
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const dataCenters = [

{
name:"Scala AI City",
company:"Scala Data Centers",
city:"Eldorado do Sul",
state:"RS",
address:"BR-290, área industrial",
lat:-30.080,
lng:-51.620,
initialMW:1500,
maxMW:5000,
status:"Anunciado",
type:"AI Campus"
},

{
name:"Rio AI City",
company:"Elea",
city:"Rio de Janeiro",
state:"RJ",
address:"Parque Olímpico / Barra",
lat:-22.977,
lng:-43.391,
initialMW:1500,
maxMW:3200,
status:"Anunciado",
type:"AI Campus"
},

{
name:"RT-One Uberlândia",
company:"RT-One",
city:"Uberlândia",
state:"MG",
address:"MGC-497",
lat:-18.980,
lng:-48.450,
initialMW:400,
maxMW:400,
status:"Licenciamento",
type:"AI Campus"
},

{
name:"RT-One Maringá",
company:"RT-One",
city:"Maringá",
state:"PR",
address:"Contorno Norte",
lat:-23.390,
lng:-51.930,
initialMW:400,
maxMW:400,
status:"Anunciado",
type:"AI Campus"
},

{
name:"Tecto São Paulo",
company:"Tecto",
city:"Interior de SP",
state:"SP",
address:"Não divulgado",
lat:-23.000,
lng:-47.100,
initialMW:200,
maxMW:200,
status:"Planejado",
type:"Hyperscale"
},

{
name:"TAKODA Sumaré",
company:"TAKODA",
city:"Sumaré",
state:"SP",
address:"Anhanguera",
lat:-22.840,
lng:-47.270,
initialMW:96,
maxMW:96,
status:"Planejado",
type:"Hyperscale"
},

{
name:"TAKODA Rio",
company:"TAKODA",
city:"Rio de Janeiro",
state:"RJ",
address:"Barra da Tijuca",
lat:-23.000,
lng:-43.360,
initialMW:64,
maxMW:64,
status:"Planejado",
type:"Hyperscale"
},

{
name:"Scala Fortaleza",
company:"Scala Data Centers",
city:"Fortaleza",
state:"CE",
address:"Praia do Futuro",
lat:-3.730,
lng:-38.540,
initialMW:7.2,
maxMW:7.2,
status:"Expansão",
type:"Edge"
},

{
name:"Ascenty SPO06",
company:"Ascenty",
city:"Osasco",
state:"SP",
address:"Campus Osasco",
lat:-23.520,
lng:-46.790,
initialMW:26,
maxMW:26,
status:"Construção",
type:"Hyperscale"
},

{
name:"Microsoft Campus",
company:"Microsoft",
city:"Hortolândia / Sumaré",
state:"SP",
address:"3 sites",
lat:-22.850,
lng:-47.250,
initialMW:null,
maxMW:null,
status:"Construção",
type:"Cloud"
},

{
name: "Omnia Caucaia (ByteDance/TikTok)",
company: "Omnia / ByteDance / Casa dos Ventos",
city: "Caucaia",
state: "CE",
address: "ZPE Ceará, Complexo do Pecém, próximo à CE-348",
lat: -3.560,
lng: -38.840,
initialMW: 300,
maxMW: 300,
status: "construction",
type: "Hyperscale AI",
investmentBRL: 200000000000,
siteAreaHa: 68
}

];

const colors={
"Anunciado":"#2563eb",
"Construção":"#16a34a",
"Licenciamento":"#f59e0b",
"Planejado":"#dc2626",
"Expansão":"#7c3aed"
};

const map=L.map("map");

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{
maxZoom:19,
attribution:"© OpenStreetMap contributors"
}
).addTo(map);

const bounds=[];

dataCenters.forEach(dc=>{

const marker=L.circleMarker(
[dc.lat,dc.lng],
{
radius:8,
color:colors[dc.status],
fillColor:colors[dc.status],
fillOpacity:0.9,
weight:2
}).addTo(map);

marker.bindPopup(`
<h3>${dc.name}</h3>

<table style="border-collapse:collapse">

<tr><td><b>Empresa</b></td><td>${dc.company}</td></tr>

<tr><td><b>Cidade</b></td><td>${dc.city}/${dc.state}</td></tr>

<tr><td><b>Endereço</b></td><td>${dc.address}</td></tr>

<tr><td><b>Tipo</b></td><td>${dc.type}</td></tr>

<tr><td><b>Status</b></td><td>${dc.status}</td></tr>

<tr><td><b>Inicial</b></td><td>${dc.initialMW ?? "-"} MW</td></tr>

<tr><td><b>Máxima</b></td><td>${dc.maxMW ?? "-"} MW</td></tr>

</table>
`);

bounds.push([dc.lat,dc.lng]);

});

map.fitBounds(bounds,{padding:[60,60]});
</script>

</body>
</html>
